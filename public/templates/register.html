<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }
        form{
            padding-right: 20px;
            padding-bottom: 10px;
        }
        button{
            margin-left: 11px;
            margin-top: 10px;
        }
        #validPassword{
            display: none;
            color: red;
        }
        p{
            color: red;
        }

        #validation{
        display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>
    <form>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirmpassword" placeholder="Confirm Password" required>
        <p id="validPassword">password does not match</p>
        <p id="errorMessage"></p>
        <button type="submit" id="registerButton">Register</button>
    </form>
</div>
<script src="../scripts/register.js"></script>
</body>
</html>
