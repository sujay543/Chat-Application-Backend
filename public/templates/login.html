<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #validation{
      display: none;
    }

    #loginForm{
      padding-right: 20px;
    }
    #submitButton{
      margin-left: 10px;
      border-radius: 20px;
    }

    input{
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Enter email" required>
      <input type="password" id="password" placeholder="Enter password" required>
      <p id="validPassword"></p>
      <button id="submitButton" type="submit">Login</button>
    </form>
  </div>
<script src="../scripts/login.js"></script>
</body>
</html>
