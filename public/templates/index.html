
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    height: 580px;
    background: var(--color-background-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    border: 0.5px solid var(--color-border-tertiary);
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--color-background-primary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text-primary);
    letter-spacing: -0.3px;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 16px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--color-background-tertiary); }

  .search-wrap {
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .search-input {
    width: 100%;
    padding: 7px 10px 7px 32px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 8px;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
    position: relative;
  }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-tertiary);
    font-size: 12px;
    pointer-events: none;
  }

  .contact-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .contact-list::-webkit-scrollbar { width: 4px; }
  .contact-list::-webkit-scrollbar-track { background: transparent; }
  .contact-list::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 4px; }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .contact-item:hover { background: var(--color-background-secondary); }
  .contact-item.active { background: var(--color-background-secondary); }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    position: relative;
  }
  .av-blue { background: #B5D4F4; color: #0C447C; }
  .av-teal { background: #9FE1CB; color: #085041; }
  .av-coral { background: #F5C4B3; color: #712B13; }
  .av-purple { background: #CECBF6; color: #3C3489; }
  .av-amber { background: #FAC775; color: #633806; }

  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #1D9E75;
    border: 2px solid var(--color-background-primary);
  }

  .contact-info { flex: 1; min-width: 0; }
  .contact-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--color-text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .contact-preview {
    font-size: 12px;
    color: var(--color-text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .contact-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .contact-time { font-size: 11px; color: var(--color-text-tertiary); }
  .unread-badge {
    background: #178AC8;
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--color-background-secondary);
  }

  .chat-header {
    padding: 14px 18px;
    background: var(--color-background-primary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--color-text-primary);
  }
  .chat-header-status {
    font-size: 12px;
    color: #1D9E75;
    margin-top: 1px;
  }

  .header-actions { display: flex; gap: 6px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 4px; }

  .date-divider {
    text-align: center;
    font-size: 11.5px;
    color: var(--color-text-tertiary);
    margin: 10px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 0.5px;
    background: var(--color-border-tertiary);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 2px;
  }
  .msg-row.sent { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 60%;
    padding: 9px 13px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.5;
    position: relative;
  }
  .bubble.received {
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-bottom-left-radius: 4px;
  }
  .bubble.sent {
    background: #185FA5;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10.5px;
    color: var(--color-text-tertiary);
    margin-top: 2px;
    padding: 0 4px;
  }
  .msg-row.sent .msg-time { text-align: right; }

  .msg-group { display: flex; flex-direction: column; }
  .msg-group.sent { align-items: flex-end; }
  .msg-group.received { align-items: flex-start; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .typing-dots {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-text-tertiary);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    background: var(--color-background-primary);
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .attach-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 15px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .attach-btn:hover { background: var(--color-background-tertiary); }

  .msg-input-wrap {
    flex: 1;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 20px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg-input-wrap:focus-within { border-color: var(--color-border-primary); }

  #msgInput {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--color-text-primary);
    outline: none;
    resize: none;
    line-height: 1.4;
    max-height: 100px;
  }
  #msgInput::placeholder { color: var(--color-text-tertiary); }

  .emoji-btn {
    color: var(--color-text-tertiary);
    font-size: 18px;
    cursor: pointer;
    transition: color 0.15s;
    background: none;
    border: none;
    padding: 0;
  }
  .emoji-btn:hover { color: var(--color-text-secondary); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #185FA5;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: #0C447C; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .contact-info{
    display: flex;
    flex-direction: row;
    background-color: #F5C4B3;
    padding: 10px;
    border-top-left-radius: 10px;
    border-bottom-left-radius: 10px;
    /* color: white; */
    font-weight: bold;
  }

  .contact-info:hover{
    background-color: #b18475;
    color: white;
  }

  .contact-image{
    font-size: 25px;
    margin-right: 15px;
  }

  .contact-name{
    margin-top: 8px;
    font-size: 15px;
  }
</style>

<h2 class="sr-only">Chat application interface mockup with sidebar contact list and message area</h2>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Messages</span>
      <button class="icon-btn" title="New chat">✏️</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search conversations..." />
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- Chat area -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="avatar av-teal" id="activeAvatar">PR</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="activeName">Priya Rajan</div>
        <div class="chat-header-status">Online</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn">📞</button>
        <button class="icon-btn">🎥</button>
        <button class="icon-btn">⋯</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="date-divider">Today</div>
      <div class="left-messages">
        
      </div>
      <div class="right-messages">

      </div>
    </div>

    <div class="input-area">
      <button class="attach-btn">📎</button>
      <div class="msg-input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
        <button class="emoji-btn">😊</button>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
