<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat UI</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 300px;
    background: #1e293b;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.chat-list {
    margin-top: 20px;
}

.chat-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.chat-item:hover {
    background: #334155;
}

/* Main area */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f1f5f9;
}

.empty-state {
    text-align: center;
    color: #64748b;
}

.empty-state h2 {
    margin-bottom: 10px;
}

#newChat{
    border-radius: 20px;
    padding: 15px;
    background-color: skyblue;
    font: optimal;
    color: white;
    font-size: 20px;
    width: 300px;
    cursor: pointer;
}
#newChat:hover{
    background-color: rgb(60, 131, 159);
}

.chat-item{
    border: solid;
    color: black;
    background-color: white;
    border-bottom-color: black;
}

</style>
</head>
<body>

<div class="sidebar">
    <h2>ChatApp</h2>
    <button id="newChat">+ New Chat</button>

    <div class="chat-list">
    </div>
</div>

<div class="main">
    <div class="empty-state">
        <h2>No chat selected</h2>
        <p>Select a chat to start messaging</p>
    </div>
</div>
<script src="../scripts/index.js"></script>
</body>
</html>
